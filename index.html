<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Presença</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- BOLHAS -->
    <div class="bubbles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- CONTAINER -->
    <div class="container">

        <!-- FOTO -->
        <div class="photo-side">
            <img src="mya.png" alt="Aniversariante">
        </div>

        <!-- CARD -->
        <div class="card form-card">

            <h2>Confirmação de Presença</h2>

            <p class="subtitle">
                Deixe seu nome e sua mensagem 💙
            </p>

            <!-- FORM -->
            <form id="formulario">

                <input
                    type="text"
                    id="nome"
                    placeholder="Seu nome"
                    required
                >

                <textarea
                    id="mensagem"
                    placeholder="Sua mensagem"
                    required
                ></textarea>

                <button type="submit">
                    Confirmar 🌊
                </button>

            </form>

            <!-- LISTA -->
            <div class="mensagens-container">

                <h3>Mensagens</h3>

                <div id="lista"></div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        Desenvolvido por <span>anna.dev</span>
    </footer>

    <script src="script.js"></script>

</body>

</html>
